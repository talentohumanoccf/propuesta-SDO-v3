<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Estrategica SDO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --sdo-teal: #78A49B;
            --sdo-pink: #F5C2C2;
            --sdo-yellow: #FEFE96;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: auto;
        }

        h1,
        h2,
        h3,
        .font-urbanist {
            font-family: 'Urbanist', sans-serif;
        }

        .text-justify {
            text-align: justify;
            text-justify: inter-word;
        }

        .node-pulse {
            animation: pulse-amber 2s infinite;
        }

        @keyframes pulse-amber {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
            }

            50% {
                box-shadow: 0 0 25px 10px rgba(245, 158, 11, 0.2);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .node-3d {
            box-shadow:
                0 6px 0 rgba(0, 0, 0, 0.08),
                0 10px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .node-3d:hover {
            transform: translateY(-5px);
            box-shadow:
                0 11px 0 rgba(0, 0, 0, 0.08),
                0 20px 30px rgba(0, 0, 0, 0.12);
        }

        .node-3d:active {
            transform: translateY(2px);
            box-shadow:
                0 2px 0 rgba(0, 0, 0, 0.08),
                0 4px 8px rgba(0, 0, 0, 0.08);
        }

        .grid-pattern {
            background-image: radial-gradient(#475569 0.8px, transparent 0.8px);
            background-size: 50px 50px;
        }

        .dark .grid-pattern {
            background-image: radial-gradient(#f59e0b 0.8px, transparent 0.8px);
        }

        .bg-integration {
            background-color: #020617;
            /* slate-950 */
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .dark .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .text-gradient-amber {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #fde68a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .shiny-logo-container::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent 45%,
                    rgba(255, 255, 255, 0.1) 50%,
                    transparent 55%);
            animation: shine 4s infinite;
            transform: rotate(30deg);
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(30deg);
            }

            100% {
                transform: translateX(100%) rotate(30deg);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        #maximize-modal-content {
            cursor: grab;
        }

        #maximize-modal-content:active {
            cursor: grabbing;
        }

        #zoom-wrapper {
            transition: transform 0.1s cubic-bezier(0.1, 0, 0.2, 1);
            transform-origin: center center;
            will-change: transform;
        }

        .floating-controls {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Preloader Styles */
        #preloader {
            position: fixed;
            inset: 0;
            background: #020617;
            /* slate-950 */
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
            perspective: 1200px;
        }

        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-logo {
            width: 180px;
            height: auto;
            animation: logo-jump 2s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
            filter: drop-shadow(0 0 30px rgba(245, 158, 11, 0.4));
        }

        @keyframes logo-jump {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0) scale(1);
            }

            40% {
                transform: translateY(-30px) scale(0.98, 1.05);
            }

            60% {
                transform: translateY(-15px) scale(0.99, 1.02);
            }
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 40px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, transparent, #f59e0b, transparent);
            animation: loader-slide 1.5s infinite linear;
        }

        @keyframes loader-slide {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(200%);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 transition-colors duration-700 min-h-screen">

    <div id="preloader">
        <img src="https://i.imgur.com/cSs7YG2.jpeg" alt="Logo SDO"
            class="loader-logo rounded-full aspect-square object-cover shadow-2xl border-4 border-white/5">
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        <div class="mt-6 text-[10px] font-black uppercase tracking-[0.5em] text-amber-500/60 animate-pulse">Cargando
            Estrategia</div>
    </div>

    <div class="fixed top-0 left-0 w-full h-1 bg-black/10 z-[100]">
        <div id="progress-bar" class="h-full bg-teal-500 transition-all duration-500" style="width: 16.66%"></div>
    </div>

    <header
        class="fixed top-0 left-0 w-full p-5 flex justify-between items-center z-50 bg-white/60 dark:bg-slate-950/60 backdrop-blur-md border-b border-slate-200/50 dark:border-white/5">
        <div class="flex items-center gap-4">
            <div
                class="bg-slate-900 p-2 rounded-xl shadow-xl border border-white/10 flex items-center justify-center min-w-[60px]">
                <img src="https://i.imgur.com/yyI6FWO.png" alt="Logo SDO" class="h-10 w-auto object-contain">
            </div>
            <div class="hidden md:block">
                <h1 class="text-base font-black uppercase tracking-tighter leading-none dark:text-white"
                    id="header-title">Propuesta Estrategica SDO</h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.25em] text-slate-500 dark:text-amber-400/90"
                    id="header-subtitle">Sustentación Técnica 2026</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <a href="https://talentohumanoccf.github.io/dashboard-SDO/" target="_blank"
                class="flex items-center gap-2.5 px-5 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all bg-amber-500 text-white shadow-lg shadow-amber-500/20 hover:scale-105 active:scale-95 hover:bg-amber-600"
                title="Ver Indicadores SDO">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Indicadores</span>
            </a>
            <button onclick="toggleIntegrationMode()"
                class="flex items-center gap-3 px-6 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all border border-slate-200 bg-white/90 text-slate-600 shadow-md hover:scale-105 active:scale-95"
                id="integration-toggle">
                <i data-lucide="lightbulb" class="w-4 h-4"></i>
                <span>Ver Capas de Valor</span>
            </button>
        </div>
    </header>

    <button onclick="prevSlide()" id="prev-btn-side"
        class="fixed left-6 top-1/2 -translate-y-1/2 z-[60] p-4 rounded-full nav-btn border border-black/5 text-slate-400 hover:text-teal-600 dark:hover:text-amber-400 opacity-0 pointer-events-none">
        <i data-lucide="chevron-left" class="w-8 h-8"></i>
    </button>

    <button onclick="nextSlide()" id="next-btn-side"
        class="fixed right-6 top-1/2 -translate-y-1/2 z-[60] p-4 rounded-full nav-btn border border-black/5 text-slate-400 hover:text-teal-600 dark:hover:text-amber-400">
        <i data-lucide="chevron-right" class="w-8 h-8"></i>
    </button>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-3 px-6 py-3 rounded-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-lg border border-black/5 dark:border-white/10"
        id="dots-container"></div>

    <main
        class="min-h-screen flex flex-col items-center justify-center p-4 pt-32 pb-32 relative grid-pattern transition-all duration-1000"
        id="main-bg">
        <div id="slide-container" class="w-full max-w-7xl"></div>
    </main>

    <div id="node-modal" class="fixed inset-0 z-[200] hidden pointer-events-none transition-all duration-300">
        <div class="absolute p-4 rounded-xl w-64 shadow-2xl border transition-all duration-300 scale-95 opacity-0 bg-white border-slate-100 pointer-events-auto"
            id="modal-content" style="top: 0; left: 0;">
            <button onclick="closeModal()"
                class="absolute top-3 right-3 text-slate-300 hover:text-slate-900 transition-colors">
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
            <div id="modal-tag"
                class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[7px] font-black uppercase tracking-wider mb-2.5 bg-teal-500/10 text-teal-600">
                <i data-lucide="award" class="w-2 h-2"></i> Ficha Técnica
            </div>
            <h3 id="modal-title" class="text-sm font-black mb-1 leading-tight text-slate-900 uppercase">Proceso</h3>
            <p id="modal-desc" class="text-[9.5px] mb-3 text-justify leading-relaxed font-bold text-slate-400">Resumen
                técnico.</p>

            <div class="p-2.5 rounded-lg space-y-2 mb-3 bg-slate-50/50 border border-slate-100" id="modal-info-box">
                <div class="flex items-start gap-1.5 text-left">
                    <div class="p-1 bg-indigo-500/10 rounded text-indigo-500 mt-0.5"><i data-lucide="target"
                            class="w-2.5 h-2.5"></i></div>
                    <div>
                        <span
                            class="text-[7px] font-black block uppercase text-slate-400 mb-0.5 tracking-wider font-urbanist">Foco</span>
                        <span id="modal-vision"
                            class="text-[10px] font-bold text-slate-800 leading-tight">Visión.</span>
                    </div>
                </div>
            </div>

            <section class="p-2.5 rounded-lg border-l-2 border-amber-400 text-left bg-amber-50/10"
                id="modal-challenge-box">
                <div
                    class="flex items-center gap-1 font-black text-[7px] uppercase mb-0.5 tracking-wide text-amber-600 font-urbanist">
                    <i data-lucide="zap" class="w-2 h-2"></i> Reto
                </div>
                <p id="modal-challenge"
                    class="text-[10px] italic text-justify font-bold leading-relaxed text-amber-900/60 font-urbanist">
                    "Reto operativo."</p>
            </section>
        </div>
    </div>

    <div id="maximize-modal"
        class="fixed inset-0 z-[300] hidden flex-col bg-slate-950/98 backdrop-blur-3xl overflow-y-auto">
        <header
            class="sticky top-0 left-0 w-full p-8 flex justify-between items-center z-[310] bg-slate-950/80 backdrop-blur-md border-b border-white/10">
            <div class="flex items-center gap-4 text-white">
                <i data-lucide="maximize-2" class="w-8 h-8 text-amber-500"></i>
                <h3 class="text-2xl font-black uppercase tracking-tight">Estructura Detallada</h3>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleFullscreen()"
                    class="p-4 rounded-2xl bg-white/10 text-white hover:bg-white/20 transition-all active:scale-95 border border-white/10"
                    title="Pantalla Completa">
                    <i data-lucide="monitor" class="w-8 h-8"></i>
                </button>
                <button onclick="closeMaximize()"
                    class="p-4 rounded-2xl bg-white/10 text-white hover:bg-white/20 transition-all active:scale-95 border border-white/10"
                    title="Salir de Exploración">
                    <i data-lucide="shrink" class="w-8 h-8"></i>
                </button>
            </div>
        </header>
        <div id="maximize-modal-content"
            class="flex-1 w-full flex flex-col items-center justify-start p-12 overflow-y-auto relative select-none">
            <div
                class="absolute bottom-12 right-12 z-[320] flex flex-col gap-3 p-3 rounded-[2.5rem] floating-controls shadow-2xl">
                <button onclick="changeZoom(0.2)"
                    class="p-4 rounded-full bg-white/5 hover:bg-white/20 text-white transition-all"><i
                        data-lucide="zoom-in" class="w-6 h-6"></i></button>
                <div class="w-full h-[1px] bg-white/10"></div>
                <button onclick="resetZoom()"
                    class="p-4 rounded-full bg-white/5 hover:bg-white/20 text-white transition-all text-[10px] font-black uppercase">1:1</button>
                <div class="w-full h-[1px] bg-white/10"></div>
                <button onclick="changeZoom(-0.2)"
                    class="p-4 rounded-full bg-white/5 hover:bg-white/20 text-white transition-all"><i
                        data-lucide="zoom-out" class="w-6 h-6"></i></button>
            </div>
            <div id="zoom-wrapper" class="flex items-center justify-center min-w-full min-h-full"></div>
        </div>
    </div>

    <script>
        const detailedNodes = {
            root: { title: 'Subdirección Desarrollo Organizacional', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Dirección estratégica para asegurar que la cultura, la tecnología y el talento converjan en alta productividad interna.', vision: 'Puente crítico entre la visión ejecutiva y la ejecución operativa.', challenge: 'Superar el vacío de decisión entre los equipos que gestan ideas y la dirección que las aprueba.' },
            cultura_bienestar: { title: 'Cultura, bienestar y experiencia del empleado', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Foco en la salud mental, el clima laboral y la satisfacción integral del colaborador.', vision: 'Bienestar como indicador de productividad.', challenge: 'Romper silos organizacionales y personalizar el ciclo de vida del colaborador.' },
            equipo_psicosocial: { title: 'Equipo psicosocial', color: 'bg-[#F5C2C2] text-[#4a2a2a]', desc: 'Apoyo integral al colaborador y su familia para facilitar la Gestión del Cambio institucional.', vision: 'Resiliencia humana ante el cambio.', challenge: 'Garantizar el acompañamiento psicosocial efectivo en cada hito de transformación.' },

            empleo_talento_nuevo: { title: 'Empleo y Gestión del Talento', color: 'bg-[#FEFE96] text-[#4a4a1a]', desc: 'Gestión y colocación de talento alineado a las necesidades del mercado moderno.', vision: 'Socio de relacionamiento estratégico externo.', challenge: 'Convertir a la Caja en un aliado metodológico para la gestión del talento externo y referente de empleabilidad.' },

            gestion_competencias: { title: 'Gestión de competencias, evaluación y efectividad organizacional', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Mapeo de habilidades y Evaluaciones 360 con impacto directo en el desempeño dinámico.', vision: 'Estructura dinámica basada en méritos.', challenge: 'Mantener manuales de funciones alineados a las exigencias de la competitividad moderna.' },

        const slides = [
            { id: 'vision', title: 'Propuesta Estratégica SDO', subtitle: 'Consolidación de la Subdirección de Desarrollo Organizacional', content: 'El marco estratégico para la creación de la Subdirección de Desarrollo Organizacional en <b class="text-amber-400">Comfamiliar Risaralda</b> propone elevar la gestión humana a un nivel directivo autónomo para respaldar el <b class="text-amber-400">Plan de Gestión 2026-2030</b> y sus grandes proyectos de expansión territorial. Ante un índice de rotación laboral del 41% en el país y los altos costos que implica reemplazar colaboradores, la iniciativa busca dejar de tratar al talento como un simple trámite operativo integrado en otras áreas administrativas. Para ello, la nueva subdirección se estructura en tres componentes clave: <b class="text-amber-400">Gestión de Talento</b>, <b class="text-amber-400">Desarrollo y Cultura</b>, y <b class="text-amber-400">Transformación Organizacional</b>. Mediante un modelo de seguimiento basado en <b class="text-amber-400">metas OKR</b>, este marco tiene como objetivo central alinear el capital humano con los retos de la institución, mitigar los riesgos laborales, impulsar la adopción tecnológica y consolidar una cultura organizacional medible que actúe como una verdadera <b class="text-amber-400">ventaja competitiva</b>.', icon: 'sparkles', isDark: true, points: ['Cultura Neuronal Ágil', 'Modelo TED', 'Employee Experience'] },

        }

        function buildTEDVisual(isDark, isMaximized = false) {
            return `<div class="p-12 rounded-[4rem] border shadow-2xl transition-all duration-1000 ${isDark ? 'bg-slate-900/50 border-amber-500/20' : 'bg-white border-slate-200'} mx-4 relative overflow-hidden">${!isMaximized ? `<button onclick="openMaximize()" class="absolute top-8 right-8 p-3 rounded-2xl bg-white/10 hover:bg-white/20 transition-all border border-white/10 z-[60] shadow-lg"><i data-lucide="maximize-2" class="w-5 h-5 ${isDark ? 'text-amber-400' : 'text-slate-500'}"></i></button>` : ''}<div class="flex flex-col md:flex-row items-center justify-between gap-12 relative z-10"><div class="flex-1 grid grid-cols-1 gap-6"><div class="p-8 rounded-[3rem] border-2 border-indigo-500/30 bg-indigo-500/5 group"><div class="flex items-center gap-5 mb-4"><div class="p-4 rounded-2xl bg-indigo-500 text-white shadow-lg"><i data-lucide="monitor" class="w-8 h-8"></i></div><h3 class="text-2xl font-black uppercase ${isDark ? 'text-indigo-400' : 'text-indigo-900'}">Tecnología</h3></div><p class="text-sm font-medium ${isDark ? 'text-slate-400' : 'text-slate-600'}">Automatización de tareas repetitivas.</p></div><div class="p-8 rounded-[3rem] border-2 border-amber-500/30 bg-amber-500/5 group"><div class="flex items-center gap-5 mb-4"><div class="p-4 rounded-2xl bg-amber-500 text-white shadow-lg"><i data-lucide="compass" class="w-8 h-8"></i></div><h3 class="text-2xl font-black uppercase ${isDark ? 'text-amber-400' : 'text-amber-900'}">Estrategia</h3></div><p class="text-sm font-medium ${isDark ? 'text-slate-400' : 'text-slate-600'}">Alineación de objetivos institucionales.</p></div><div class="p-8 rounded-[3rem] border-2 border-emerald-500/30 bg-emerald-500/5 group"><div class="flex items-center gap-5 mb-4"><div class="p-4 rounded-2xl bg-emerald-500 text-white shadow-lg"><i data-lucide="bar-chart-3" class="w-8 h-8"></i></div><h3 class="text-2xl font-black uppercase ${isDark ? 'text-emerald-400' : 'text-emerald-900'}">Desempeño</h3></div><p class="text-sm font-medium ${isDark ? 'text-slate-400' : 'text-slate-600'}">Resultados de alta productividad.</p></div></div><div class="w-full md:w-1/3 flex flex-col items-center justify-center relative"><div class="relative w-64 h-64"><div class="absolute inset-0 rounded-full border-4 border-dashed border-slate-300 animate-[spin_20s_linear_infinite]"></div><div class="absolute inset-4 rounded-full border-4 border-indigo-500/20"></div><div class="absolute inset-0 flex items-center justify-center"><div class="text-center"><div class="text-6xl font-black text-amber-500">TED</div><div class="text-[10px] uppercase font-black tracking-[0.3em] ${isDark ? 'text-slate-500' : 'text-slate-400'}">Ecosistema 2026</div></div></div></div></div></div></div>`;
        }

        function buildPoints(isDark, points) {
            return `<div class="grid grid-cols-1 gap-6 fade-in px-4">${points.map(p => `<div class="p-7 rounded-[2.5rem] flex items-center gap-6 border node-3d ${isDark ? 'bg-white/5 border-white/10 text-white' : 'bg-white border-slate-100 text-slate-800'}"><div class="w-10 h-10 rounded-full bg-teal-500/20 flex items-center justify-center text-teal-600"><i data-lucide="award" class="w-6 h-6"></i></div><span class="font-black text-lg leading-tight uppercase tracking-tight">${p}</span></div>`).join('')}</div>`;
        }

        function nextSlide() { if (currentSlideIndex < slides.length - 1) { currentSlideIndex++; renderSlide(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }
        function prevSlide() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }
        function changeSlide(index) { currentSlideIndex = index; renderSlide(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        function openModal(e, id) {
            const node = detailedNodes[id];
            if (!node) return;
            const modal = document.getElementById('node-modal');
            const content = document.getElementById('modal-content');

            document.getElementById('modal-title').innerText = node.title;
            document.getElementById('modal-desc').innerText = node.desc || 'Información estratégica.';
            document.getElementById('modal-vision').innerText = node.vision || 'N/A';
            document.getElementById('modal-challenge').innerText = `"${node.challenge || 'Definiendo reto'}"`;

            // Posicionamiento inteligente
            modal.style.display = 'block'; // Mostrar temporalmente para medir
            const rect = e.currentTarget.getBoundingClientRect();
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;
            const cardWidth = content.offsetWidth;
            const cardHeight = content.offsetHeight;

            let posX = rect.right + 20;
            let posY = rect.top - 10;

            // Ajuste horizontal (Evitar desborde derecho)
            if (posX + cardWidth > winWidth - 20) {
                posX = rect.left - cardWidth - 20;
            }

            // Ajuste vertical (Evitar desborde inferior)
            if (posY + cardHeight > winHeight - 20) {
                posY = winHeight - cardHeight - 20;
            }

            // Ajuste vertical (Evitar desborde superior)
            if (posY < 80) posY = 80; // Margen para el header

            content.style.left = posX + 'px';
            content.style.top = posY + 'px';

            modal.classList.remove('hidden');
            modal.classList.add('block');

            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('node-modal');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95', 'opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('block');
            }, 300);
        }

        let currentScale = 1; let offsetX = 0; let offsetY = 0; let isDragging = false; let startX, startY;

        function openMaximize() {
            const slide = slides[currentSlideIndex];
            const isDark = integrationMode || slide.isDark;
            const modal = document.getElementById('maximize-modal');
            const wrapper = document.getElementById('zoom-wrapper');
            resetZoom();
            let visualHtml = '';
            if (slide.isMap) visualHtml = buildMapTemplate(isDark, true);
            else if (slide.isTEDVisual) visualHtml = buildTEDVisual(isDark, true);
            wrapper.innerHTML = visualHtml;
            modal.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
            initPanZoom();
        }

        function closeMaximize() {
            const modal = document.getElementById('maximize-modal');
            modal.classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function initPanZoom() {
            const container = document.getElementById('maximize-modal-content');
            container.onwheel = (e) => { e.preventDefault(); const delta = e.deltaY > 0 ? -0.1 : 0.1; changeZoom(delta); };
            container.onmousedown = (e) => { isDragging = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY; container.style.cursor = 'grabbing'; };
            window.onmousemove = (e) => { if (!isDragging) return; offsetX = e.clientX - startX; offsetY = e.clientY - startY; applyTransform(); };
            window.onmouseup = () => { isDragging = false; container.style.cursor = 'grab'; };
        }

        function changeZoom(delta) { currentScale = Math.min(Math.max(currentScale + delta, 0.5), 3); applyTransform(); }
        function resetZoom() { currentScale = 1; offsetX = 0; offsetY = 0; applyTransform(); }
        function applyTransform() { const wrapper = document.getElementById('zoom-wrapper'); if (wrapper) wrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${currentScale})`; }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.log(err)); else document.exitFullscreen(); }
        function toggleAppFullscreen() { const modal = document.getElementById('maximize-modal'); if (!document.fullscreenElement) modal.requestFullscreen().catch(err => console.log(err)); else document.exitFullscreen(); }
    </script>
</body>

</html>
